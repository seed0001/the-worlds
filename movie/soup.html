<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Worlds — the soup (Episode 2, Act 2)</title>
    <link rel="stylesheet" href="/src/doc/doc.css" />
  </head>
  <body>
    <div id="chrome">
      <span id="world"></span>
      <span id="progress"></span>
    </div>

    <div id="caption"></div>

    <button id="start" class="soup-start">▶ begin the soup</button>

    <style>
      .soup-start {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 40;
        padding: 14px 40px;
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #dce8f7;
        background: rgba(120, 175, 235, 0.12);
        border: 1px solid rgba(150, 190, 240, 0.5);
        border-radius: 3px;
        cursor: pointer;
      }
      .soup-start:hover { background: rgba(120, 175, 235, 0.28); }
      #chrome { gap: 16px; }
      #world { color: #9fb2cc; }
    </style>

    <script type="module" src="/src/dev/soup.js"></script>
  </body>
</html>
