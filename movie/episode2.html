<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Worlds — Episode 2: The Living World</title>
    <link rel="stylesheet" href="/src/doc/doc.css" />
  </head>
  <body>
    <div id="chrome">
      <span id="world"></span>
      <span id="progress"></span>
    </div>

    <div id="caption"></div>
    <button id="replay" class="hidden" hidden>new universe</button>

    <button id="start" class="ep2-start">▶ begin Episode 2</button>

    <style>
      .ep2-start {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 40;
        padding: 14px 40px;
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #dce8f7;
        background: rgba(120, 175, 235, 0.12);
        border: 1px solid rgba(150, 190, 240, 0.5);
        border-radius: 3px;
        cursor: pointer;
      }
      .ep2-start:hover { background: rgba(120, 175, 235, 0.28); }
      #chrome { gap: 16px; }
      #world { color: #9fb2cc; }
      #replay { left: 50%; top: 54%; transform: translateX(-50%); }
    </style>

    <script type="module" src="/src/doc/episode2/main.js"></script>
  </body>
</html>
