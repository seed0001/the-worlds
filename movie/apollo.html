<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apollo — The Mission</title>
    <link rel="stylesheet" href="/src/doc/doc.css" />
  </head>
  <body>
    <a id="hub-link" href="/">&lsaquo; all engines</a>

    <div id="chrome">
      <span id="world">Apollo</span>
      <span id="progress"></span>
    </div>

    <div id="caption"></div>
    <button id="replay" class="hidden" hidden>replay the mission</button>

    <button id="start" class="apollo-start">▶ begin the mission</button>

    <style>
      .apollo-start {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 40;
        padding: 14px 40px;
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #eaf0f7;
        background: rgba(200, 210, 225, 0.1);
        border: 1px solid rgba(210, 220, 235, 0.5);
        border-radius: 3px;
        cursor: pointer;
      }
      .apollo-start:hover { background: rgba(200, 210, 225, 0.24); }
      #chrome { gap: 16px; }
      #world { color: #b8c2d6; letter-spacing: 0.14em; text-transform: uppercase; font-size: 13px; }
      #replay { left: 50%; top: 54%; transform: translateX(-50%); }
      #hub-link {
        position: fixed; top: 18px; left: 22px; z-index: 45;
        font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
        color: #8a95ab; text-decoration: none;
      }
      #hub-link:hover { color: #e8eef7; }
    </style>

    <script type="module" src="/src/mission/main.js"></script>
  </body>
</html>
