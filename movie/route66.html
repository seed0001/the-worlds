<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Route 66 — The Mother Road</title>
    <link rel="stylesheet" href="/src/doc/doc.css" />
  </head>
  <body>
    <a id="hub-link" href="/">&lsaquo; all engines</a>

    <div id="chrome">
      <span id="world">Route 66</span>
      <span id="progress"></span>
    </div>

    <div id="caption"></div>
    <button id="replay" class="hidden" hidden>replay</button>

    <button id="start" class="r66-start">▶ begin</button>

    <style>
      .r66-start {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 40;
        padding: 14px 40px;
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #f4ecd8;
        background: rgba(200, 90, 60, 0.14);
        border: 1px solid rgba(235, 190, 140, 0.55);
        border-radius: 3px;
        cursor: pointer;
      }
      .r66-start:hover { background: rgba(200, 90, 60, 0.3); }
      #chrome { gap: 16px; }
      #world { color: #e0a878; letter-spacing: 0.14em; text-transform: uppercase; font-size: 13px; }
      #replay { left: 50%; top: 54%; transform: translateX(-50%); }
      #hub-link {
        position: fixed; top: 18px; left: 22px; z-index: 45;
        font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
        color: #8a95ab; text-decoration: none;
      }
      #hub-link:hover { color: #e8eef7; }
    </style>

    <script type="module" src="/src/route66/main.js"></script>
  </body>
</html>
